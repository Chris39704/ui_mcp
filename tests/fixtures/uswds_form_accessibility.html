<html>
  <body>
    <main>
      <h1>Form</h1>
      <p>Guidance for form controls.</p>
      <h2>When to use</h2>
      <p>Use forms to collect user input.</p>
      <h2>Accessibility guidance</h2>
      <ul>
        <li>Associate labels with every control.</li>
        <li>Use clear error messages and inline validation.</li>
        <li>Do not rely on color alone.</li>
      </ul>
      <h2>Example</h2>
      <pre><code>&lt;label for="name"&gt;Name&lt;/label&gt;</code></pre>
    </main>
  </body>
</html>
